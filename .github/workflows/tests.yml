name: tests

on:
  push:
  pull_request:

jobs:
  # Mock-based suite: no KiCad, and deliberately NO PyYAML — this job proves
  # the vendored yaml fallback. The pcbnew/wireviz tests skip themselves.
  unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests (vendored-yaml path)
        run: |
          set -e
          python3 -c "import harness.yamlio as y; m = y.import_yaml(); assert '_vendor' in m.__file__, m.__file__"
          for t in tests/test_*.py; do python3 "$t"; done

  # Render the emitted YAML through real WireViz (catches schema/coercion
  # mismatches that structural checks can't, e.g. int-vs-str pin ids).
  wireviz-render:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz
      - run: pip install PyYAML wireviz
      - run: python3 tests/test_wireviz_render.py

  # Build the Plugin-and-Content-Manager package and keep it as an artifact
  # (KiCad -> Plugin and Content Manager -> Install from File...).
  # GitHub wraps every artifact download in a zip of its own, so uploading
  # the .zip would hand users a zip-inside-a-zip that PCM rejects with
  # "Archive does not contain valid metadata.json file". Uploading the
  # EXTRACTED tree instead makes GitHub's wrapper zip itself the
  # installable package (metadata.json at the archive root).
  pcm-package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/build_pcm.py
      - name: Validate metadata.json against the official PCM schema
        run: |
          pip install jsonschema
          curl -sSL -o /tmp/pcm_schema.json https://go.kicad.org/pcm/schemas/v1
          python3 -c "import json, jsonschema; jsonschema.validate(json.load(open('pcm/metadata.json')), json.load(open('/tmp/pcm_schema.json'))); print('metadata.json: schema-valid')"
      - name: Stage extracted package tree for upload
        run: python3 -m zipfile -e dist/harness_docs_pcm.zip dist/pcm/
      - uses: actions/upload-artifact@v4
        with:
          name: harness-docs-pcm
          path: dist/pcm/

  # Full suite against real pcbnew, installed from the official KiCad 10 PPA.
  # pcbnew binds to the system python3, so PyYAML comes from apt, not pip.
  kicad-integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install KiCad 10
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends kicad python3-yaml
      - name: Run tests (incl. pcbnew integration)
        run: |
          set -e
          python3 -c "import pcbnew; print(pcbnew.GetBuildVersion())"
          for t in tests/test_*.py; do python3 "$t"; done
